<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SilverCloud | Galileo Fondos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Space+Mono:wght@400;700&display=swap');
  :root{
    --bg-primary:#0a0e17;--bg-secondary:#111827;--bg-card:#1a2235;--bg-card-hover:#1f2a40;
    --bg-input:#0d1220;--border:#2a3550;--text-primary:#e8ecf4;--text-secondary:#8892a8;
    --text-muted:#5a6580;--accent-blue:#4a9eff;--green:#34d399;--green-bg:rgba(52,211,153,0.1);
    --red:#f87171;--red-bg:rgba(248,113,113,0.1);--gold:#fbbf24;--purple:#a78bfa;--cyan:#22d3ee;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
  .topnav{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:0.5rem 1.5rem;display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;position:relative;z-index:1}
  .topnav a{font-family:'Space Mono',monospace;font-size:0.7rem;padding:0.35rem 0.8rem;border-radius:6px;text-decoration:none;color:var(--text-muted);transition:all 0.15s;border:1px solid transparent}
  .topnav a:hover{color:var(--text-primary);background:var(--bg-card)}
  .topnav a.active{color:var(--accent-blue);border-color:var(--accent-blue);background:rgba(74,158,255,0.08)}
  .topnav .home-link{color:var(--text-secondary);font-weight:700;margin-right:0.5rem}
  .container{max-width:1400px;margin:0 auto;padding:1.5rem;position:relative;z-index:1}

  /* Fund selector */
  .fund-tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem}
  .fund-tab{font-family:'Space Mono',monospace;font-size:0.8rem;padding:0.6rem 1.5rem;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;transition:all 0.2s}
  .fund-tab:hover{border-color:var(--accent-blue);color:var(--text-secondary)}
  .fund-tab.active{background:var(--accent-blue);border-color:var(--accent-blue);color:var(--bg-primary);font-weight:700}

  /* Profile card */
  .profile-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem}
  .profile-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;flex-wrap:wrap;gap:1rem}
  .profile-name{font-size:1.3rem;font-weight:700;color:var(--accent-blue);margin-bottom:0.3rem}
  .profile-desc{font-size:0.8rem;color:var(--text-secondary);line-height:1.5;max-width:700px}
  .profile-badge{font-family:'Space Mono',monospace;font-size:0.6rem;padding:0.2rem 0.6rem;border-radius:5px;background:rgba(74,158,255,0.12);color:var(--accent-blue);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;display:inline-block;margin-top:0.4rem;margin-right:0.3rem}
  .profile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.8rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
  .profile-item .pi-label{font-size:0.55rem;color:var(--text-muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:1px}
  .profile-item .pi-value{font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:600;color:var(--text-primary)}

  /* Performance table */
  .perf-section{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem}
  .perf-section h3{font-size:0.65rem;color:var(--text-muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:2px;margin-bottom:1rem}
  .perf-grid{display:flex;gap:0;flex-wrap:wrap;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .perf-cell{flex:1;min-width:100px;padding:0.8rem;text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
  .perf-cell:last-child{border-right:none}
  .perf-cell .pc-label{font-size:0.55rem;color:var(--text-muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.3rem}
  .perf-cell .pc-value{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700}

  /* NAV / YTD bar */
  .nav-bar{display:flex;gap:1.5rem;margin-bottom:1.5rem;padding:1rem 1.2rem;background:var(--bg-secondary);border-radius:10px;border:1px solid var(--border);align-items:center;flex-wrap:wrap}
  .nav-item{display:flex;align-items:center;gap:0.5rem}
  .nav-label{font-size:0.6rem;color:var(--text-muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:1px}
  .nav-input{background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--gold);font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:700;padding:0.35rem 0.5rem;width:120px;text-align:right;outline:none}
  .nav-input:focus{border-color:var(--accent-blue)}
  .nav-value{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700}
  .nav-ytd{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;padding:0.3rem 0.8rem;border-radius:8px}

  /* Composition area */
  .comp-overview{display:grid;grid-template-columns:260px 1fr;gap:1rem;margin-bottom:1.5rem}
  .pie-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;display:flex;flex-direction:column;align-items:center}
  .pie-card h3{font-size:0.65rem;color:var(--text-muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:2px;margin-bottom:0.8rem;align-self:flex-start}
  .weight-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.2rem}
  .weight-card h3{font-size:0.65rem;color:var(--text-muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:2px;margin-bottom:0.8rem}
  .weight-row{display:flex;align-items:center;gap:0.8rem;margin-bottom:0.5rem}
  .weight-label{width:130px;font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--text-secondary)}
  .weight-bar-bg{flex:1;height:22px;background:var(--bg-secondary);border-radius:5px;overflow:hidden}
  .weight-bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-family:'Space Mono',monospace;font-size:0.65rem;font-weight:700;color:var(--bg-primary);min-width:30px;transition:width 0.5s}
  .weight-amount{width:120px;text-align:right;font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--text-muted)}

  /* Blocks */
  .block{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;margin-bottom:1rem;overflow:hidden}
  .block-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.2rem;border-bottom:1px solid var(--border)}
  .block-title-area{display:flex;align-items:center;gap:0.8rem}
  .block-color{width:12px;height:12px;border-radius:3px}
  .block-title-input{background:transparent;border:none;color:var(--text-primary);font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;outline:none;width:200px}
  .block-title-input:focus{border-bottom:1px solid var(--accent-blue)}
  .block-weight{font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:700;color:var(--accent-blue)}
  .block-total{font-family:'Space Mono',monospace;font-size:0.8rem;color:var(--text-muted);margin-left:1rem}
  .block-actions{display:flex;gap:0.3rem}

  .btn-sm{font-size:0.7rem;padding:0.3rem 0.6rem;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);font-family:'DM Sans',sans-serif;transition:all 0.15s}
  .btn-sm:hover{border-color:var(--accent-blue);color:var(--text-primary)}
  .btn-sm.danger{border-color:transparent}.btn-sm.danger:hover{border-color:var(--red);color:var(--red)}

  .block table{width:100%;border-collapse:collapse}
  .block thead th{font-family:'Space Mono',monospace;font-size:0.55rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);padding:0.5rem 0.8rem;text-align:right;border-bottom:1px solid var(--border)}
  .block thead th:first-child{text-align:left}
  .block tbody tr{border-bottom:1px solid rgba(42,53,80,0.3)}
  .block tbody tr:hover{background:var(--bg-card-hover)}
  .block tbody td{padding:0.45rem 0.8rem;text-align:right;font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--text-secondary)}
  .block tbody td:first-child{text-align:left;font-weight:700;color:var(--accent-blue)}
  .block .edit-input{background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--gold);font-family:'Space Mono',monospace;font-size:0.75rem;font-weight:700;padding:0.25rem 0.4rem;width:90px;text-align:right;outline:none}
  .block .edit-input:focus{border-color:var(--accent-blue)}
  .block .ticker-input{color:var(--accent-blue);width:70px;text-align:left}
  .del-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.7rem;padding:0.2rem}
  .del-btn:hover{color:var(--red)}

  .add-block-btn{display:flex;align-items:center;justify-content:center;padding:1rem;border:2px dashed var(--border);border-radius:14px;color:var(--text-muted);cursor:pointer;font-family:'Space Mono',monospace;font-size:0.8rem;transition:all 0.2s;margin-bottom:1.5rem}
  .add-block-btn:hover{border-color:var(--accent-blue);color:var(--accent-blue)}

  .header-actions{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
  .btn{font-family:'DM Sans',sans-serif;font-size:0.8rem;padding:0.45rem 0.9rem;border-radius:8px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:0.3rem;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary)}
  .btn:hover{background:var(--bg-card-hover);color:var(--text-primary);border-color:var(--accent-blue)}

  .footer{text-align:center;padding:1rem 0;color:var(--text-muted);font-size:0.65rem;font-family:'Space Mono',monospace}
  .positive{color:var(--green)!important}.negative{color:var(--red)!important}

  @media(max-width:768px){.container{padding:0.8rem}.comp-overview{grid-template-columns:1fr}.perf-grid{flex-direction:column}}
</style>
</head>
<body>
<div class="topnav">
  <a href="index.html" class="home-link">← SC</a>
  <a href="crypto.html">Crypto</a>
  <a href="curva-pesos.html">Curva Tasa Fija</a>
  <a href="precios-iol.html">Precios IOL</a>
  <a href="cartera.html">Mi Cartera</a>
  <a href="galileo.html" class="active">Galileo Fondos</a>
</div>

<div class="container">
  <!-- Fund selector -->
  <div class="fund-tabs">
    <button class="fund-tab active" onclick="switchFund('multi',this)">Galileo Multimercado IV</button>
    <button class="fund-tab" onclick="switchFund('renta',this)">Galileo Renta</button>
  </div>

  <!-- Profile -->
  <div class="profile-card" id="profileCard"></div>

  <!-- Performance -->
  <div class="perf-section" id="perfSection"></div>

  <!-- NAV / YTD -->
  <div class="nav-bar">
    <div class="nav-item">
      <span class="nav-label">NAV 31/12/25</span>
      <input class="nav-input" id="navStart" placeholder="0,00" onchange="saveAndRecalc()">
    </div>
    <div class="nav-item">
      <span class="nav-label">NAV Actual</span>
      <input class="nav-input" id="navNow" placeholder="0,00" onchange="saveAndRecalc()">
    </div>
    <div class="nav-item">
      <span class="nav-label">AUM (Patrimonio)</span>
      <input class="nav-input" id="aumInput" placeholder="0" style="width:150px" onchange="saveAndRecalc()">
    </div>
    <div class="nav-item">
      <span class="nav-label">YTD</span>
      <span class="nav-ytd" id="ytdDisplay">--</span>
    </div>
  </div>

  <!-- Composition overview -->
  <div class="comp-overview">
    <div class="pie-card">
      <h3>Ponderación</h3>
      <canvas id="pieChart" width="220" height="220"></canvas>
    </div>
    <div class="weight-card">
      <h3>Distribución por Categoría</h3>
      <div id="weightBars"></div>
    </div>
  </div>

  <!-- Blocks -->
  <div id="blocksContainer"></div>
  <div class="add-block-btn" onclick="addBlock()">+ Agregar Categoría</div>

  <!-- Actions -->
  <div class="header-actions">
    <button class="btn" onclick="exportFund()">↓ Exportar JSON</button>
    <button class="btn" onclick="document.getElementById('importFile').click()">↑ Importar JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importFund(event)">
  </div>

  <div class="footer">SilverCloud &copy; 2026 — Galileo Fondos — Datos guardados en tu navegador</div>
</div>

<script>
// ============================================================
// FUND PROFILES (static info)
// ============================================================
const PROFILES = {
  multi: {
    name: 'Galileo Multimercado IV-A',
    desc: 'Fondo abierto de inversión constituido en Argentina. El fondo busca alcanzar los mejores resultados gestionando el riesgo asociado, identificando y conformando un portafolio de inversiones de renta mixta con grados variables de diversificación. El fondo invierte al menos el 75% en instrumentos financieros y valores negociables emitidos en el país exclusivamente en moneda de curso legal.',
    badges: ['Open-End Fund','Mixed Allocation','Dynamic Allocation','Argentina'],
    info: {
      'Inicio': '17/11/2022', 'Clase': 'Institucional', 'Moneda': 'ARS',
      'Inv. Mínima': 'ARS 1.000', 'Expense Ratio': '5,40%',
      'Front Load': '2,00%', 'Back Load': '5,00%', 'Mgmt Fee': '5,00%',
      'Fuente': 'CAFCI'
    },
    perf: [
      {label:'1 Sem',value:0.14},{label:'1 Mes',value:0.46},{label:'3 Meses',value:-4.62},
      {label:'YTD',value:-4.35},{label:'1 Año',value:27.54},{label:'3 Años',value:111.96},
      {label:'2025',value:35.60},{label:'2024',value:98.44},{label:'2023',value:309.31}
    ],
    metrics: {
      'Sharpe (1Y)': '-0,09', 'Volatilidad (1Y)': '26,10%', 'Sortino (1Y)': '-0,18', 'Downside Risk': '14,51%'
    }
  },
  renta: {
    name: 'Galileo Renta-A',
    desc: 'Fondo abierto de renta fija constituido en Argentina. Objetivo: Aggregate Bond. El fondo invierte en instrumentos de renta fija de alta calidad crediticia emitidos en Argentina, buscando generar retornos consistentes a través de una gestión activa de duración y crédito.',
    badges: ['Open-End Fund','Fixed Income','Aggregate','Argentina'],
    info: {
      'NAV': 'ARS 45.780,16', 'Patrimonio': 'ARS 11,11B', 'Moneda': 'ARS',
      'Fuente': 'CAFCI', 'Expense Ratio': 'N.A.'
    },
    perf: [
      {label:'1 Sem',value:0.77},{label:'1 Mes',value:2.59},{label:'3 Meses',value:6.15},
      {label:'YTD',value:6.31},{label:'1 Año',value:44.25},{label:'3 Años',value:89.19},
      {label:'5 Años',value:85.34},
      {label:'2025',value:40.14},{label:'2024',value:72.87},{label:'2023',value:205.19},{label:'2022',value:96.01}
    ],
    metrics: {
      'Sharpe (1Y)': '0,79', 'Volatilidad (1Y)': '13,24%', 'Sortino (1Y)': '0,83', 'Downside Risk': '9,04%'
    }
  }
};

// Default block colors
const BLOCK_COLORS = ['#4a9eff','#34d399','#a78bfa','#22d3ee','#fbbf24','#fb923c','#f87171','#ec4899'];

// ============================================================
// STATE
// ============================================================
let currentFund = 'multi';
let fundData = {
  multi: { navStart:0, navNow:0, aum:'', blocks:[] },
  renta: { navStart:0, navNow:0, aum:'', blocks:[] }
};

// ============================================================
// PERSISTENCE
// ============================================================
function saveData() {
  // Read current inputs
  const fd = fundData[currentFund];
  fd.navStart = parseNum(document.getElementById('navStart').value);
  fd.navNow = parseNum(document.getElementById('navNow').value);
  fd.aum = document.getElementById('aumInput').value;
  localStorage.setItem('sc_galileo', JSON.stringify(fundData));
}

function loadData() {
  try {
    const raw = localStorage.getItem('sc_galileo');
    if (raw) fundData = JSON.parse(raw);
  } catch(e) { console.error(e); }
}

function saveAndRecalc() { saveData(); recalc(); }

function exportFund() {
  saveData();
  const blob = new Blob([JSON.stringify(fundData, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'galileo-fondos-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importFund(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = function(ev) {
    try { fundData = JSON.parse(ev.target.result); saveData(); renderAll(); }
    catch(err) { alert('Error: ' + err.message); }
  };
  r.readAsText(f); e.target.value = '';
}

// ============================================================
// HELPERS
// ============================================================
function parseNum(s) {
  if (!s) return 0;
  return parseFloat(String(s).replace(/\./g,'').replace(',','.')) || 0;
}
function fmtNum(n) {
  if (n == null || isNaN(n)) return '--';
  return n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '--';
  return (n>=0?'+':'') + n.toFixed(2) + '%';
}
function fmtMoney(n) {
  if (n == null || isNaN(n) || n === 0) return '--';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  return '$' + fmtNum(n);
}

// ============================================================
// FUND SWITCHING
// ============================================================
function switchFund(fund, btn) {
  saveData();
  currentFund = fund;
  document.querySelectorAll('.fund-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ============================================================
// RENDER
// ============================================================
function renderAll() {
  renderProfile();
  renderPerf();
  renderNav();
  renderBlocks();
  recalc();
}

function renderProfile() {
  const p = PROFILES[currentFund];
  document.getElementById('profileCard').innerHTML = `
    <div class="profile-header">
      <div>
        <div class="profile-name">${p.name}</div>
        <div class="profile-desc">${p.desc}</div>
        <div style="margin-top:0.5rem">${p.badges.map(b=>'<span class="profile-badge">'+b+'</span>').join('')}</div>
      </div>
    </div>
    <div class="profile-grid">
      ${Object.entries(p.info).map(([k,v])=>`<div class="profile-item"><div class="pi-label">${k}</div><div class="pi-value">${v}</div></div>`).join('')}
      ${Object.entries(p.metrics||{}).map(([k,v])=>`<div class="profile-item"><div class="pi-label">${k}</div><div class="pi-value">${v}</div></div>`).join('')}
    </div>`;
}

function renderPerf() {
  const p = PROFILES[currentFund];
  if (!p.perf.length) {
    document.getElementById('perfSection').innerHTML = '<h3>Performance Histórica</h3><div style="color:var(--text-muted);font-size:0.8rem;padding:0.5rem 0">Sin datos de performance</div>';
    return;
  }
  document.getElementById('perfSection').innerHTML = `
    <h3>Performance Histórica</h3>
    <div class="perf-grid">
      ${p.perf.map(x=>`<div class="perf-cell">
        <div class="pc-label">${x.label}</div>
        <div class="pc-value ${x.value>=0?'positive':'negative'}">${fmtPct(x.value)}</div>
      </div>`).join('')}
    </div>`;
}

function renderNav() {
  const fd = fundData[currentFund];
  document.getElementById('navStart').value = fd.navStart ? fmtNum(fd.navStart) : '';
  document.getElementById('navNow').value = fd.navNow ? fmtNum(fd.navNow) : '';
  document.getElementById('aumInput').value = fd.aum || '';
}

// ============================================================
// BLOCKS
// ============================================================
function renderBlocks() {
  const fd = fundData[currentFund];
  const container = document.getElementById('blocksContainer');
  container.innerHTML = fd.blocks.map((block, bi) => {
    const color = block.color || BLOCK_COLORS[bi % BLOCK_COLORS.length];
    const rows = (block.positions || []).map((pos, pi) => `
      <tr>
        <td><input class="edit-input ticker-input" value="${pos.ticker||''}" onchange="updatePos(${bi},${pi},'ticker',this.value)"></td>
        <td><input class="edit-input" value="${pos.qty||''}" onchange="updatePos(${bi},${pi},'qty',this.value)" style="width:100px"></td>
        <td><input class="edit-input" value="${pos.price||''}" onchange="updatePos(${bi},${pi},'price',this.value)"></td>
        <td class="calc-total" id="pt_${bi}_${pi}">--</td>
        <td class="calc-weight" id="pw_${bi}_${pi}">--</td>
        <td class="calc-aporte" id="pa_${bi}_${pi}">--</td>
        <td><button class="del-btn" onclick="deletePos(${bi},${pi})">✕</button></td>
      </tr>`).join('');

    return `<div class="block">
      <div class="block-header">
        <div class="block-title-area">
          <div class="block-color" style="background:${color}"></div>
          <input class="block-title-input" value="${block.name||'Categoría'}" onchange="updateBlockName(${bi},this.value)">
          <span class="block-weight" id="bw_${bi}">--</span>
          <span class="block-total" id="bt_${bi}">--</span>
        </div>
        <div class="block-actions">
          <button class="btn-sm" onclick="addPos(${bi})">+ Activo</button>
          <button class="btn-sm danger" onclick="deleteBlock(${bi})">✕</button>
        </div>
      </div>
      <table>
        <thead><tr>
          <th style="text-align:left">Ticker</th><th>Cantidad</th><th>Precio</th>
          <th>Total</th><th>Peso %</th><th>Aporte %</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');
}

function addBlock() {
  const fd = fundData[currentFund];
  const ci = fd.blocks.length;
  fd.blocks.push({
    name: 'Nueva Categoría',
    color: BLOCK_COLORS[ci % BLOCK_COLORS.length],
    positions: []
  });
  saveData(); renderBlocks(); recalc();
}

function deleteBlock(bi) {
  if (!confirm('¿Eliminar esta categoría y sus posiciones?')) return;
  fundData[currentFund].blocks.splice(bi, 1);
  saveData(); renderBlocks(); recalc();
}

function updateBlockName(bi, val) {
  fundData[currentFund].blocks[bi].name = val;
  saveData(); recalc();
}

function addPos(bi) {
  fundData[currentFund].blocks[bi].positions.push({ticker:'',qty:'',price:''});
  saveData(); renderBlocks(); recalc();
}

function deletePos(bi, pi) {
  fundData[currentFund].blocks[bi].positions.splice(pi, 1);
  saveData(); renderBlocks(); recalc();
}

function updatePos(bi, pi, field, val) {
  fundData[currentFund].blocks[bi].positions[pi][field] = val;
  saveData(); recalc();
}

// ============================================================
// RECALC
// ============================================================
function recalc() {
  const fd = fundData[currentFund];

  // YTD
  const navS = parseNum(document.getElementById('navStart').value);
  const navN = parseNum(document.getElementById('navNow').value);
  const ytdEl = document.getElementById('ytdDisplay');
  if (navS && navN) {
    const ytd = ((navN - navS) / navS) * 100;
    ytdEl.textContent = fmtPct(ytd);
    ytdEl.className = 'nav-ytd ' + (ytd >= 0 ? 'positive' : 'negative');
    ytdEl.style.background = ytd >= 0 ? 'rgba(52,211,153,0.12)' : 'rgba(248,113,113,0.12)';
  } else {
    ytdEl.textContent = '--';
    ytdEl.className = 'nav-ytd';
    ytdEl.style.background = 'transparent';
  }

  // Calculate block totals
  let grandTotal = 0;
  const blockTotals = [];

  fd.blocks.forEach((block, bi) => {
    let blockTotal = 0;
    (block.positions || []).forEach((pos, pi) => {
      const qty = parseNum(pos.qty);
      const price = parseNum(pos.price);
      const total = qty * price;
      pos._total = total;
      blockTotal += total;
    });
    block._total = blockTotal;
    blockTotals.push({ name: block.name, total: blockTotal, color: block.color || BLOCK_COLORS[bi % BLOCK_COLORS.length] });
    grandTotal += blockTotal;
  });

  // Update position cells
  fd.blocks.forEach((block, bi) => {
    (block.positions || []).forEach((pos, pi) => {
      const tEl = document.getElementById('pt_'+bi+'_'+pi);
      const wEl = document.getElementById('pw_'+bi+'_'+pi);
      const aEl = document.getElementById('pa_'+bi+'_'+pi);
      if (tEl) tEl.textContent = fmtMoney(pos._total);
      if (wEl) wEl.textContent = grandTotal ? ((pos._total/grandTotal)*100).toFixed(2)+'%' : '--';
      if (aEl) aEl.textContent = block._total ? ((pos._total/block._total)*100).toFixed(1)+'%' : '--';
    });
    // Block header
    const bwEl = document.getElementById('bw_'+bi);
    const btEl = document.getElementById('bt_'+bi);
    if (bwEl) bwEl.textContent = grandTotal ? ((block._total/grandTotal)*100).toFixed(1)+'%' : '--';
    if (btEl) btEl.textContent = fmtMoney(block._total);
  });

  // Weight bars
  const wbEl = document.getElementById('weightBars');
  wbEl.innerHTML = blockTotals.filter(b=>b.total>0).sort((a,b)=>b.total-a.total).map(b => {
    const pct = grandTotal ? (b.total/grandTotal*100) : 0;
    return `<div class="weight-row">
      <span class="weight-label">${b.name}</span>
      <div class="weight-bar-bg"><div class="weight-bar-fill" style="width:${Math.max(pct,2)}%;background:${b.color}">${pct.toFixed(1)}%</div></div>
      <span class="weight-amount">${fmtMoney(b.total)}</span>
    </div>`;
  }).join('') || '<div style="color:var(--text-muted);font-size:0.8rem">Agregá categorías y activos</div>';

  // Pie
  drawPie(blockTotals.filter(b=>b.total>0));
}

// ============================================================
// PIE
// ============================================================
function drawPie(slices) {
  const c = document.getElementById('pieChart');
  const ctx = c.getContext('2d');
  const w=c.width, h=c.height, cx=w/2, cy=h/2, r=Math.min(w,h)/2-10;
  ctx.clearRect(0,0,w,h);
  const total = slices.reduce((s,x)=>s+x.total,0);
  if (!total) {
    ctx.fillStyle='#2a3550';ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5a6580';ctx.font='12px Space Mono';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Sin datos',cx,cy);return;
  }
  let angle = -Math.PI/2;
  slices.forEach(sl => {
    const sa = (sl.total/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+sa);ctx.closePath();
    ctx.fillStyle=sl.color;ctx.fill();
    if (sl.total/total > 0.05) {
      const mid=angle+sa/2, lx=cx+Math.cos(mid)*r*0.7, ly=cy+Math.sin(mid)*r*0.7;
      ctx.fillStyle='#0a0e17';ctx.font='bold 10px Space Mono';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText((sl.total/total*100).toFixed(0)+'%',lx,ly);
    }
    angle += sa;
  });
  ctx.beginPath();ctx.arc(cx,cy,r*0.48,0,Math.PI*2);ctx.fillStyle='#1a2235';ctx.fill();
  ctx.fillStyle='#e8ecf4';ctx.font='bold 11px Space Mono';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(fmtMoney(total),cx,cy);
}
