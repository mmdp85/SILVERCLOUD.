<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SilverCloud | Precios IOL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg-primary:#0a0e17;--bg-secondary:#111827;--bg-card:#1a2235;--bg-card-hover:#1f2a40;
    --border:#2a3550;--text-primary:#e8ecf4;--text-secondary:#8892a8;--text-muted:#5a6580;
    --accent-blue:#4a9eff;--green:#34d399;--green-bg:rgba(52,211,153,0.1);
    --red:#f87171;--red-bg:rgba(248,113,113,0.1);--gold:#fbbf24;--purple:#a78bfa;
    --mep:#34d399;--cable:#a78bfa;--pesos:#fbbf24;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
  .container{max-width:1500px;margin:0 auto;padding:1.5rem;position:relative;z-index:1}
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
  .logo-area{display:flex;align-items:center;gap:0.8rem}
  .logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#4a9eff,#a8b8d0);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:1rem;color:var(--bg-primary)}
  .logo-text h1{font-size:1.3rem;font-weight:700;letter-spacing:-0.5px}
  .logo-text span{font-size:0.65rem;color:var(--text-muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:2px}
  .header-right{display:flex;align-items:center;gap:1.2rem}
  .status-badge{display:flex;align-items:center;gap:0.4rem;font-size:0.75rem;color:var(--text-secondary);font-family:'Space Mono',monospace}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
  .status-dot.error{background:var(--red);animation:none}.status-dot.loading{background:var(--gold)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .last-update{font-size:0.7rem;color:var(--text-muted);font-family:'Space Mono',monospace}
  .refresh-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);padding:0.4rem 0.8rem;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.8rem;transition:all 0.2s;display:flex;align-items:center;gap:0.3rem}
  .refresh-btn:hover{background:var(--bg-card-hover);color:var(--text-primary);border-color:var(--accent-blue)}
  .tabs{display:flex;gap:0.3rem;margin-bottom:1.2rem;flex-wrap:wrap}
  .tab{font-family:'Space Mono',monospace;font-size:0.75rem;padding:0.5rem 1.2rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.2s;white-space:nowrap}
  .tab:hover{border-color:var(--accent-blue);color:var(--text-secondary)}
  .tab.active{background:var(--accent-blue);border-color:var(--accent-blue);color:var(--bg-primary);font-weight:700}
  .tab .count{font-size:0.6rem;opacity:0.7;margin-left:0.3rem}
  .search-bar{display:flex;gap:0.8rem;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
  .search-input{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:'Space Mono',monospace;font-size:0.8rem;padding:0.5rem 1rem;width:280px;outline:none;transition:border-color 0.2s}
  .search-input:focus{border-color:var(--accent-blue)}.search-input::placeholder{color:var(--text-muted)}
  .result-count{font-size:0.7rem;color:var(--text-muted);font-family:'Space Mono',monospace}
  .table-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .table-scroll{overflow-x:auto;max-height:75vh;overflow-y:auto}
  table{width:100%;border-collapse:collapse;font-size:0.8rem}
  thead th{font-family:'Space Mono',monospace;font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:0.7rem 0.8rem;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;background:var(--bg-card);z-index:2}
  thead th:first-child{text-align:left}thead th:nth-child(2){text-align:left}
  thead th.sortable{cursor:pointer;user-select:none}thead th.sortable:hover{color:var(--accent-blue)}
  tbody tr{border-bottom:1px solid rgba(42,53,80,0.3);transition:background 0.1s;cursor:pointer}
  tbody tr:hover{background:var(--bg-card-hover)}
  tbody td{padding:0.55rem 0.8rem;text-align:right;font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--text-secondary);white-space:nowrap}
  tbody td:first-child{text-align:left;font-weight:700;color:var(--accent-blue)}
  tbody td:nth-child(2){text-align:left;color:var(--text-muted);font-size:0.7rem;max-width:200px;overflow:hidden;text-overflow:ellipsis}
  .positive{color:var(--green)!important}.negative{color:var(--red)!important}.vol-high{color:var(--gold)}
  .spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent-blue);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:var(--red-bg);border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:1rem;color:var(--red);font-size:0.85rem;margin-bottom:1rem;display:none}
  .error-box.visible{display:block}
  .summary-bar{display:flex;gap:1.5rem;margin-bottom:1rem;padding:0.8rem 1.2rem;background:var(--bg-secondary);border-radius:10px;border:1px solid var(--border);flex-wrap:wrap}
  .summary-stat{display:flex;flex-direction:column;gap:0.15rem}
  .summary-stat .label{font-size:0.6rem;color:var(--text-muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:1px}
  .summary-stat .value{font-size:0.9rem;font-weight:700}
  .footer{text-align:center;padding:1.5rem 0 0.5rem;color:var(--text-muted);font-size:0.65rem;font-family:'Space Mono',monospace}

  /* ── FILTRO MONEDA BONOS ───────────────────────────────── */
  .moneda-filter{display:none;align-items:center;gap:1rem;padding:0.55rem 1rem;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;margin-bottom:0.9rem;flex-wrap:wrap}
  .moneda-filter.visible{display:flex}
  .moneda-filter-label{font-family:'Space Mono',monospace;font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);white-space:nowrap}
  .moneda-cb{display:flex;align-items:center;gap:0.35rem;cursor:pointer;user-select:none}
  .moneda-cb input[type=checkbox]{appearance:none;-webkit-appearance:none;width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border);background:var(--bg-card);cursor:pointer;transition:all 0.15s;position:relative;flex-shrink:0}
  .moneda-cb input[type=checkbox]:checked{border-color:currentColor}
  .moneda-cb input[type=checkbox]:checked::after{content:'✓';position:absolute;top:-1px;left:1px;font-size:10px;font-weight:700;color:currentColor}
  .cb-pesos input{color:var(--pesos)}.cb-pesos input:checked{background:rgba(251,191,36,0.15)}
  .cb-mep   input{color:var(--mep)  }.cb-mep   input:checked{background:rgba(52,211,153,0.15)}
  .cb-cable input{color:var(--cable)}.cb-cable input:checked{background:rgba(167,139,250,0.15)}
  .cb-label{font-family:'Space Mono',monospace;font-size:0.7rem;font-weight:600}
  .cb-pesos .cb-label{color:var(--pesos)}
  .cb-mep   .cb-label{color:var(--mep)}
  .cb-cable .cb-label{color:var(--cable)}

  /* badge de moneda en la tabla de bonos */
  .moneda-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:0.55rem;font-weight:700;letter-spacing:0.5px;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle;text-transform:uppercase}
  .mb-pesos{background:rgba(251,191,36,0.12);color:var(--pesos)}
  .mb-mep  {background:rgba(52,211,153,0.12);color:var(--mep)}
  .mb-cable{background:rgba(167,139,250,0.12);color:var(--cable)}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .modal-overlay.open{display:flex}
  .modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.5);animation:modalIn 0.2s ease-out}
  @keyframes modalIn{from{opacity:0;transform:scale(0.95)translateY(10px)}to{opacity:1;transform:none}}
  .modal-header{display:flex;justify-content:space-between;align-items:flex-start;padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--border)}
  .modal-ticker{font-family:'Space Mono',monospace;font-size:1.5rem;font-weight:700;color:var(--accent-blue)}
  .modal-desc{font-size:0.85rem;color:var(--text-secondary);margin-top:0.2rem}
  .modal-type-badge{font-family:'Space Mono',monospace;font-size:0.6rem;font-weight:700;padding:0.2rem 0.6rem;border-radius:5px;text-transform:uppercase;background:rgba(74,158,255,0.15);color:var(--accent-blue);margin-top:0.4rem;display:inline-block}
  .modal-close{background:none;border:none;color:var(--text-muted);font-size:1.5rem;cursor:pointer;padding:0.2rem 0.5rem;border-radius:6px;transition:all 0.15s;line-height:1}
  .modal-close:hover{background:var(--bg-card);color:var(--text-primary)}
  .modal-price-section{padding:1.2rem 1.5rem;display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--border)}
  .modal-price{font-family:'Space Mono',monospace;font-size:2rem;font-weight:700}
  .modal-change{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700}
  .modal-stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border)}
  .modal-stat{padding:0.8rem 1rem;text-align:center;border-right:1px solid var(--border)}
  .modal-stat:nth-child(3n){border-right:none}
  .modal-stat .ms-label{font-size:0.55rem;color:var(--text-muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.2rem}
  .modal-stat .ms-value{font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:600;color:var(--text-secondary)}
  .puntas-section{padding:1.2rem 1.5rem}
  .puntas-title{font-family:'Space Mono',monospace;font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin-bottom:0.8rem}
  .puntas-table{width:100%;border:1px solid var(--border);border-radius:10px;overflow:hidden;border-collapse:collapse}
  .puntas-table thead th{padding:0.5rem;font-family:'Space Mono',monospace;font-size:0.55rem;text-transform:uppercase;letter-spacing:1px;text-align:center;border-bottom:1px solid var(--border)}
  .puntas-table .buy-h{background:rgba(52,211,153,0.1);color:var(--green)}
  .puntas-table .sell-h{background:rgba(248,113,113,0.1);color:var(--red)}
  .puntas-table td{padding:0.4rem 0.6rem;text-align:center;font-family:'Space Mono',monospace;font-size:0.75rem;border-bottom:1px solid rgba(42,53,80,0.3)}
  .puntas-table tr:last-child td{border-bottom:none}
  .puntas-table .buy-qty{color:var(--green)}.puntas-table .buy-price{color:var(--green);font-weight:600}
  .puntas-table .sell-price{color:var(--red);font-weight:600}.puntas-table .sell-qty{color:var(--red)}
  .puntas-table .mid-col{border-left:2px solid var(--border);border-right:2px solid var(--border);width:1px;padding:0;background:var(--bg-primary)}
  .ratio-section{padding:1rem 1.5rem;border-top:1px solid var(--border)}
  .ratio-title{font-family:'Space Mono',monospace;font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin-bottom:0.6rem}
  .ratio-grid{display:flex;gap:1.5rem;flex-wrap:wrap}
  .ratio-item{display:flex;flex-direction:column;gap:0.15rem}
  .ratio-item .ri-label{font-size:0.55rem;color:var(--text-muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:0.5px}
  .ratio-item .ri-value{font-family:'Space Mono',monospace;font-size:0.9rem;font-weight:700;color:var(--purple)}
  .modal-loading{display:flex;align-items:center;justify-content:center;padding:3rem;gap:0.6rem}
  .modal-loading span{font-family:'Space Mono',monospace;font-size:0.8rem;color:var(--text-muted)}
  @media(max-width:768px){.container{padding:0.8rem}.header{flex-direction:column;gap:0.8rem;align-items:flex-start}.search-input{width:100%}.modal{width:98vw}.modal-stats{grid-template-columns:repeat(2,1fr)}}
  .topnav{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:0.5rem 1.5rem;display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;position:relative;z-index:1}
  .topnav a{font-family:'Space Mono',monospace;font-size:0.7rem;padding:0.35rem 0.8rem;border-radius:6px;text-decoration:none;color:var(--text-muted);transition:all 0.15s;border:1px solid transparent}
  .topnav a:hover{color:var(--text-primary);background:var(--bg-card)}
  .topnav a.active{color:var(--accent-blue);border-color:var(--accent-blue);background:rgba(74,158,255,0.08)}
  .topnav .home-link{color:var(--text-secondary);font-weight:700;margin-right:0.5rem}
  .topnav .home-link:hover{color:var(--accent-blue)}
  .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#0a0e17;border-top:1px solid #2a3550;z-index:50;padding:0.4rem 0.5rem 0.6rem;justify-content:space-around;align-items:center}
  .bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:0.15rem;text-decoration:none;color:#5a6580;font-size:0.55rem;font-family:'Space Mono',monospace;padding:0.3rem 0.4rem;border-radius:8px;transition:all 0.15s;min-width:50px}
  .bottom-nav a:hover,.bottom-nav a.active{color:#4a9eff}
  .bottom-nav a .bn-icon{font-size:1.2rem;line-height:1}
  @media(max-width:768px){.bottom-nav{display:flex}body{padding-bottom:70px}}
</style>
</head>

<div class="container">
  <div class="header">
    <div class="logo-area">
      <div class="logo-icon">SC</div>
      <div class="logo-text"><h1>SilverCloud</h1><span>Precios IOL — En Vivo</span></div>
    </div>
    <div class="header-right">
      <div class="status-badge"><div class="status-dot loading" id="statusDot"></div><span id="statusText">Cargando...</span></div>
      <span class="last-update" id="lastUpdate">--:--:--</span>
      <button class="refresh-btn" onclick="loadAll()">↻ Actualizar</button>
    </div>
  </div>
  <div class="error-box" id="errorBox"></div>
  <div class="tabs">
    <button class="tab active" data-tab="acciones" onclick="switchTab('acciones',this)">Acciones <span class="count" id="countAcciones"></span></button>
    <button class="tab" data-tab="cedears" onclick="switchTab('cedears',this)">CEDEARs <span class="count" id="countCedears"></span></button>
    <button class="tab" data-tab="bonoshd" onclick="switchTab('bonoshd',this)">Bonos HD <span class="count" id="countBonoshd"></span></button>
    <button class="tab" data-tab="bonoscer" onclick="switchTab('bonoscer',this)">Bonos CER <span class="count" id="countBonoscer"></span></button>
  </div>
  <div class="summary-bar" id="summaryBar"></div>

  <!-- FILTRO MONEDA — solo visible en tabs de bonos -->
  <div class="moneda-filter" id="monedaFilter">
    <span class="moneda-filter-label">Mostrar:</span>
    <label class="moneda-cb cb-pesos">
      <input type="checkbox" id="cbPesos" checked onchange="renderBody()">
      <span class="cb-label">Pesos (ARS)</span>
    </label>
    <label class="moneda-cb cb-mep">
      <input type="checkbox" id="cbMep" checked onchange="renderBody()">
      <span class="cb-label">Dólares MEP (D)</span>
    </label>
    <label class="moneda-cb cb-cable">
      <input type="checkbox" id="cbCable" checked onchange="renderBody()">
      <span class="cb-label">Dólares Cable (C)</span>
    </label>
  </div>

  <div class="search-bar">
    <input class="search-input" type="text" id="searchInput" placeholder="Buscar ticker o nombre..." oninput="filterTable()">
    <span class="result-count" id="resultCount"></span>
  </div>
  <div class="table-wrap"><div class="table-scroll">
    <table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
  </div></div>
  <div class="footer">SilverCloud &copy; 2026 — Datos en vivo vía IOL API — Click en un ticker para ver puntas</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div id="modalContent"><div class="modal-loading"><div class="spinner"></div><span>Cargando...</span></div></div></div>
</div>

<script>
const PROXY='https://silvercloud-api.vercel.app/api/iol';
const REFRESH_MS=60000;
const PANEL_LIDER=['GGAL','YPF','PAMP','TXAR','ALUA','SUPV','BBAR','BMA','TECO2','LOMA','MIRG','CRES','TGSU2','EDN','COME','CEPU','BYMA','VALO','IRSA','HARG','TGNO4','TRAN','METR','AGRO','AUSO','BOLT','CGPA2','CADO','MOLA','MORI','LONG','INVJ','FIPL','GARO','GBAN','DGCU2','FERR','SEMI','BHIP','RICH','BPAT','CTIO','GCLA','CAPX','CELU','SAMI','DOME','DYCA','IRCP','INTR','CARC','MTR','RIGO','ROSE','CVH'];
const CEDEARS_TOP=['MELI','AAPL','MSFT','GOOGL','AMZN','TSLA','NVDA','META','BABA','NU','GLOB','DESP','AMD','INTC','BA','KO','DIS','PBR','VALE','JPM','WMT','V','MA','NFLX','PYPL','UBER','COIN','MCD','NKE','GOLD','SQ','SHOP','SNAP','ABNB','BIDU','JD','PDD','TSM','QCOM','AVGO','CRM','ORCL','IBM','GS','BAC','C','XOM','CVX','SLB','ADBE'];
const BONOS_HD=['AL29','AL29D','AL29C','AL30','AL30D','AL30C','AL35','AL35D','AL35C','AL41','AL41D','AL41C','AE38','AE38D','AE38C','GD29','GD29D','GD29C','GD30','GD30D','GD30C','GD35','GD35D','GD35C','GD38','GD38D','GD38C','GD41','GD41D','GD41C','GD46','GD46D','GD46C'];
const BONOS_CER=['TZXM6','X15Y6','X29Y6','TZX26','X31L6','X30S6','TZXO6','TX26','X30N6','TZXD6','TZXM7','TZXA7','TZXY7','TZX27','TZXD7','TZX28','TX28','TX31','T2X5','T4X5','T5X5','CUAP','DICP','PARP','TC25'];
const CEDEAR_RATIOS={'MELI':6,'AAPL':10,'MSFT':10,'GOOGL':9,'AMZN':12,'TSLA':15,'NVDA':5,'META':6,'BABA':9,'NU':5,'GLOB':3,'DESP':4,'AMD':5,'INTC':5,'BA':3,'KO':5,'DIS':5,'PBR':5,'VALE':5,'JPM':3,'WMT':5,'V':5,'MA':3,'NFLX':4,'PYPL':5,'UBER':5,'COIN':4,'MCD':3,'NKE':5,'GOLD':5,'SQ':4,'SHOP':5,'SNAP':10,'ABNB':4,'BIDU':5,'JD':8,'PDD':5,'TSM':5,'QCOM':5,'AVGO':3,'CRM':3,'ORCL':5,'IBM':3,'GS':2,'BAC':5,'C':5,'XOM':5,'CVX':3,'SLB':5,'ADBE':3};

let allData={acciones:[],cedears:[],bonoshd:[],bonoscer:[]};
let currentTab='acciones',sortCol=null,sortDir=1,refreshTimer=null;

// ── Detecta moneda de un ticker de bono por sufijo ────────
// D = Dólares MEP, C = Dólares Cable, sin sufijo = Pesos
function bonoMoneda(simbolo) {
  const s = simbolo || '';
  if (s.endsWith('D')) return 'mep';
  if (s.endsWith('C')) return 'cable';
  return 'pesos';
}

function isBonos() { return currentTab === 'bonoshd' || currentTab === 'bonoscer'; }

async function fetchJSON(u){const r=await fetch(u);if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}

async function loadAll(){
  setStatus('loading','Cargando...');
  try{
    const[acciones,cedears,tp,letras,ons]=await Promise.all([
      fetchJSON(PROXY+'/v2/Cotizaciones/acciones/argentina/Todos'),
      fetchJSON(PROXY+'/v2/Cotizaciones/cedears/argentina/Todos'),
      fetchJSON(PROXY+'/v2/Cotizaciones/titulosPublicos/argentina/Todos'),
      fetchJSON(PROXY+'/v2/Cotizaciones/letras/argentina/Todos'),
      fetchJSON(PROXY+'/v2/Cotizaciones/obligacionesNegociables/argentina/Todos'),
    ]);
    const al=(acciones.titulos||[]).filter(t=>t.moneda==='1');
    const cl=(cedears.titulos||[]).filter(t=>t.moneda==='1');
    const bl=[...(tp.titulos||[]),...(letras.titulos||[]),...(ons.titulos||[])];
    allData.acciones=al.filter(t=>PANEL_LIDER.includes(t.simbolo));
    allData.cedears=cl.filter(t=>(t.volumen||0)>0||(t.cantidadOperaciones||0)>0).sort((a,b)=>(b.volumen||0)-(a.volumen||0));
    allData.bonoshd=bl.filter(t=>BONOS_HD.includes(t.simbolo));
    allData.bonoscer=bl.filter(t=>BONOS_CER.includes(t.simbolo));
    const extra=al.filter(t=>!PANEL_LIDER.includes(t.simbolo)&&t.volumen>0);
    allData.acciones=[...allData.acciones,...extra.sort((a,b)=>(b.volumen||0)-(a.volumen||0)).slice(0,10)];
    document.getElementById('countAcciones').textContent='('+allData.acciones.length+')';
    document.getElementById('countCedears').textContent='('+allData.cedears.length+')';
    document.getElementById('countBonoshd').textContent='('+allData.bonoshd.length+')';
    document.getElementById('countBonoscer').textContent='('+allData.bonoscer.length+')';
    setStatus('ok','En vivo');
    document.getElementById('lastUpdate').textContent=new Date().toLocaleTimeString('es-AR');
    hideError();renderTab();
  }catch(e){console.error(e);setStatus('error','Error');showError('Error: '+e.message)}
}

function switchTab(t,b){
  currentTab=t;sortCol=null;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  document.getElementById('searchInput').value='';
  // Mostrar/ocultar filtro moneda
  document.getElementById('monedaFilter').classList.toggle('visible', isBonos());
  renderTab();
}

function renderTab(){renderSummary();renderHead();renderBody()}

function renderSummary(){
  const raw=allData[currentTab]||[];
  // Para el summary usamos los datos filtrados si es bonos
  const d = isBonos() ? applyMonedaFilter(raw) : raw;
  const bar=document.getElementById('summaryBar');
  if(!d.length){bar.innerHTML='';return}
  const up=d.filter(t=>(t.variacionPorcentual||0)>0).length;
  const dn=d.filter(t=>(t.variacionPorcentual||0)<0).length;
  const fl=d.length-up-dn;
  const tv=d.reduce((s,t)=>s+(t.volumen||0),0);
  const av=d.reduce((s,t)=>s+(t.variacionPorcentual||0),0)/d.length;
  bar.innerHTML=`<div class="summary-stat"><span class="label">Instrumentos</span><span class="value">${d.length}</span></div><div class="summary-stat"><span class="label">Suben</span><span class="value positive">${up}</span></div><div class="summary-stat"><span class="label">Bajan</span><span class="value negative">${dn}</span></div><div class="summary-stat"><span class="label">Sin cambio</span><span class="value">${fl}</span></div><div class="summary-stat"><span class="label">Var. Promedio</span><span class="value ${av>=0?'positive':'negative'}">${av>=0?'+':''}${av.toFixed(2)}%</span></div><div class="summary-stat"><span class="label">Vol. Total</span><span class="value">${fmtVol(tv)}</span></div>`;
}

// Aplica el filtro de checkboxes a un array de bonos
function applyMonedaFilter(data) {
  const showPesos = document.getElementById('cbPesos').checked;
  const showMep   = document.getElementById('cbMep').checked;
  const showCable = document.getElementById('cbCable').checked;
  return data.filter(t => {
    const m = bonoMoneda(t.simbolo);
    if (m === 'pesos'  && !showPesos) return false;
    if (m === 'mep'    && !showMep)   return false;
    if (m === 'cable'  && !showCable) return false;
    return true;
  });
}

function getColumns(){return[
  {key:'simbolo',label:'Ticker',align:'left'},{key:'descripcion',label:'Nombre',align:'left'},
  {key:'ultimoPrecio',label:'Último',sort:true},{key:'variacionPorcentual',label:'Var %',sort:true},
  {key:'precioCompra',label:'Compra',sort:true},{key:'precioVenta',label:'Venta',sort:true},
  {key:'apertura',label:'Apertura',sort:true},{key:'maximo',label:'Máximo',sort:true},
  {key:'minimo',label:'Mínimo',sort:true},{key:'ultimoCierre',label:'Cierre Ant.',sort:true},
  {key:'volumen',label:'Volumen',sort:true},{key:'cantidadOperaciones',label:'Ops',sort:true}
]}

function renderHead(){
  const cols=getColumns();const h=document.getElementById('tableHead');
  h.innerHTML='<tr>'+cols.map(c=>{
    const ar=sortCol===c.key?(sortDir===1?' ▲':' ▼'):'';
    const al=c.align==='left'?'text-align:left':'';
    return`<th class="${c.sort?'sortable':''}" style="${al}" onclick="${c.sort?"sortBy('"+c.key+"')":''}">
    ${c.label}<span style="font-size:0.5rem;margin-left:2px">${ar}</span></th>`}).join('')+'</tr>';
}

function renderBody(){
  let d=[...(allData[currentTab]||[])];

  // Filtro moneda (solo bonos)
  if (isBonos()) d = applyMonedaFilter(d);

  const s=document.getElementById('searchInput').value.toUpperCase().trim();
  if(s)d=d.filter(t=>(t.simbolo||'').toUpperCase().includes(s)||(t.descripcion||'').toUpperCase().includes(s));
  if(sortCol)d.sort((a,b)=>{let va=a[sortCol],vb=b[sortCol];if(typeof va==='string')return sortDir*va.localeCompare(vb);return sortDir*((va||0)-(vb||0))});
  document.getElementById('resultCount').textContent=d.length+' instrumentos';
  const tb=document.getElementById('tableBody');
  if(!d.length){tb.innerHTML='<tr><td colspan="12" style="text-align:center;padding:2rem;color:var(--text-muted)">Sin datos</td></tr>';return}
  tb.innerHTML=d.map(t=>{
    const vp=t.variacionPorcentual||0;const vc=vp>0?'positive':vp<0?'negative':'';
    const vs=(vp>0?'+':'')+vp.toFixed(2)+'%';
    // Badge moneda para bonos
    let badge='';
    if(isBonos()){
      const m=bonoMoneda(t.simbolo);
      const cls=m==='mep'?'mb-mep':m==='cable'?'mb-cable':'mb-pesos';
      const lbl=m==='mep'?'MEP':m==='cable'?'Cable':'ARS';
      badge=`<span class="moneda-badge ${cls}">${lbl}</span>`;
    }
    return`<tr onclick="openDetail('${t.simbolo}','${t.mercado||'bCBA'}')">
      <td>${t.simbolo||'--'}${badge}</td><td>${truncate(t.descripcion||'',28)}</td>
      <td>${fmtNum(t.ultimoPrecio)}</td><td class="${vc}" style="font-weight:700">${vs}</td>
      <td class="positive">${fmtNum(t.precioCompra)}</td><td class="negative">${fmtNum(t.precioVenta)}</td>
      <td>${fmtNum(t.apertura)}</td><td>${fmtNum(t.maximo)}</td><td>${fmtNum(t.minimo)}</td>
      <td>${fmtNum(t.ultimoCierre)}</td>
      <td class="${t.volumen>1000000?'vol-high':''}">${fmtVol(t.volumen)}</td>
      <td>${fmtInt(t.cantidadOperaciones)}</td></tr>`}).join('');
}

function sortBy(c){if(sortCol===c)sortDir*=-1;else{sortCol=c;sortDir=-1}renderHead();renderBody()}
function filterTable(){renderBody()}

// ═══════════ MODAL ═══════════
async function openDetail(sim,merc){
  const ov=document.getElementById('modalOverlay'),ct=document.getElementById('modalContent');
  ov.classList.add('open');
  ct.innerHTML='<div class="modal-loading"><div class="spinner"></div><span>Cargando '+sim+'...</span></div>';
  try{
    const d=await fetchJSON(PROXY+'/v2/'+merc+'/Titulos/'+sim+'/CotizacionDetalle');
    renderModal(d,sim);
  }catch(e){ct.innerHTML='<div style="padding:2rem;text-align:center;color:var(--red)">Error: '+e.message+'</div>'}
}

function renderModal(d,sim){
  const ct=document.getElementById('modalContent');
  const vp=d.variacion||0;const vc=vp>0?'positive':vp<0?'negative':'';
  const vs=(vp>0?'+':'')+vp.toFixed(2)+'%';
  const tend=d.tendencia||'';
  const isCed=currentTab==='cedears';
  const ratio=CEDEAR_RATIOS[sim];
  let pHTML='';
  if(d.puntas&&d.puntas.length){
    const rows=d.puntas.map(p=>`<tr>
      <td class="buy-qty">${fmtInt(p.cantidadCompra)}</td>
      <td class="buy-price">${fmtNum(p.precioCompra)}</td>
      <td class="mid-col"></td>
      <td class="sell-price">${fmtNum(p.precioVenta)}</td>
      <td class="sell-qty">${fmtInt(p.cantidadVenta)}</td>
    </tr>`).join('');
    pHTML=`<div class="puntas-section">
      <div class="puntas-title">Caja de Puntas</div>
      <table class="puntas-table">
        <thead><tr>
          <th class="buy-h">Cant.</th><th class="buy-h">Precio</th>
          <th style="width:2px;padding:0"></th>
          <th class="sell-h">Precio</th><th class="sell-h">Cant.</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  }
  let rHTML='';
  if(isCed&&ratio){
    rHTML=`<div class="ratio-section">
      <div class="ratio-title">Información CEDEAR</div>
      <div class="ratio-grid">
        <div class="ratio-item"><span class="ri-label">Ratio</span><span class="ri-value">${ratio}:1</span></div>
        <div class="ratio-item"><span class="ri-label">CEDEARs por ADR</span><span class="ri-value">${ratio}</span></div>
        ${d.ultimoPrecio?`<div class="ratio-item"><span class="ri-label">Precio implícito x ADR (ARS)</span><span class="ri-value">${fmtNum(d.ultimoPrecio*ratio)}</span></div>`:''}
      </div></div>`;
  }
  ct.innerHTML=`
    <div class="modal-header">
      <div>
        <div class="modal-ticker">${sim}</div>
        <div class="modal-desc">${d.descripcionTitulo||d.descripcion||''}</div>
        <span class="modal-type-badge">${d.tipo||currentTab}${d.moneda?' · '+d.moneda:''}${d.plazo?' · '+d.plazo:''}</span>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-price-section">
      <div class="modal-price">${fmtNum(d.ultimoPrecio)}</div>
      <div class="modal-change ${vc}">
        ${tend==='sube'?'▲':tend==='baja'?'▼':'●'} ${vs}
        ${d.puntosVariacion?'<span style="font-size:0.75rem;opacity:0.7"> ('+(d.puntosVariacion>0?'+':'')+d.puntosVariacion+')</span>':''}
      </div>
    </div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="ms-label">Apertura</div><div class="ms-value">${fmtNum(d.apertura)}</div></div>
      <div class="modal-stat"><div class="ms-label">Máximo</div><div class="ms-value">${fmtNum(d.maximo)}</div></div>
      <div class="modal-stat"><div class="ms-label">Mínimo</div><div class="ms-value">${fmtNum(d.minimo)}</div></div>
      <div class="modal-stat"><div class="ms-label">Cierre Ant.</div><div class="ms-value">${fmtNum(d.cierreAnterior)}</div></div>
      <div class="modal-stat"><div class="ms-label">Monto Operado</div><div class="ms-value">${fmtVol(d.montoOperado)}</div></div>
      <div class="modal-stat"><div class="ms-label">Operaciones</div><div class="ms-value">${fmtInt(d.cantidadOperaciones)}</div></div>
    </div>
    ${pHTML}${rHTML}`;
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

function fmtNum(n){if(n==null||n===0)return'--';return n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtInt(n){if(n==null||n===0)return'--';return n.toLocaleString('es-AR')}
function fmtVol(n){if(n==null||n===0)return'--';if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toLocaleString('es-AR')}
function truncate(s,l){return s.length>l?s.substring(0,l)+'...':s}
function setStatus(t,m){document.getElementById('statusDot').className='status-dot'+(t==='error'?' error':t==='loading'?' loading':'');document.getElementById('statusText').textContent=m}
function showError(m){var e=document.getElementById('errorBox');e.textContent=m;e.classList.add('visible')}
function hideError(){document.getElementById('errorBox').classList.remove('visible')}

document.addEventListener('DOMContentLoaded',()=>{loadAll();refreshTimer=setInterval(loadAll,REFRESH_MS)});
